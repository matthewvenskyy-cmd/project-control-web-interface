<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Control</title>
    <link rel="icon" href="assets/stump.jpg" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <button id="toggleTasks" class="collapse-button page-task-toggle" type="button" aria-label="Collapse to-do area" title="Collapse to-do area">
      <span class="button-icon task-icon" aria-hidden="true"></span>
    </button>

    <main class="shell">
      <section class="topbar" aria-label="Project overview">
        <div>
          <p class="eyebrow">Project Control</p>
          <h1>Today's workspace</h1>
        </div>
        <div class="top-actions">
          <div class="panel-dock" aria-label="Workspace panel controls">
            <button id="toggleCanvas" class="collapse-button" type="button" aria-label="Collapse drawing area" title="Collapse drawing area">
              <span class="button-icon drawing-icon" aria-hidden="true"></span>
            </button>
            <button id="toggleTyping" class="collapse-button" type="button" aria-label="Collapse typing area" title="Collapse typing area">
              <span class="button-icon code-icon" aria-hidden="true"></span>
            </button>
          </div>
          <div class="status-strip">
            <div>
              <span id="taskCount">0</span>
              <small>open tasks</small>
            </div>
          </div>
        </div>
      </section>

      <section id="layout" class="layout">
        <aside id="taskPanel" class="panel task-panel" aria-label="Task list">
          <div class="panel-heading">
            <div class="panel-title">
              <p class="eyebrow">Next steps</p>
              <h2>To-do</h2>
            </div>
            <div class="task-heading-actions">
              <button id="clearDone" class="icon-button" type="button" aria-label="Clear completed tasks" title="Clear completed">
                OK
              </button>
            </div>
          </div>

          <form id="taskForm" class="task-form">
            <input id="taskInput" type="text" placeholder="Add something concrete..." autocomplete="off" />
            <button type="submit">Add</button>
          </form>

          <ul id="taskList" class="task-list" aria-label="Tasks"></ul>
        </aside>

        <div class="work-panels">
          <section id="canvasPanel" class="panel canvas-panel" aria-label="Drawing space">
            <div class="panel-heading">
              <div class="panel-title">
                <p class="eyebrow">Sketch area</p>
                <h2>Draw, map, scribble</h2>
              </div>
              <div class="toolbar" aria-label="Drawing tools">
                <input id="colorPicker" type="color" value="#2364aa" aria-label="Brush color" title="Brush color" />
                <input id="brushSize" type="range" min="2" max="28" value="6" aria-label="Brush size" title="Brush size" />
                <button id="eraseMode" class="tool-button" type="button">Erase</button>
                <button id="clearCanvas" class="tool-button" type="button">Clear</button>
                <button id="saveCanvas" class="tool-button" type="button">Save PNG</button>
              </div>
            </div>
            <div class="canvas-wrap">
              <canvas id="drawCanvas" aria-label="Freehand drawing canvas"></canvas>
              <div id="eraserPreview" class="eraser-preview" aria-hidden="true"></div>
            </div>
          </section>

          <section id="typingPanel" class="panel typing-panel" aria-label="Typing space">
            <div class="panel-heading">
              <div class="panel-title">
                <p class="eyebrow">Typing area</p>
                <h2>Notes and code</h2>
              </div>
              <div class="editor-actions">
                <button id="openText" class="tool-button" type="button">Open TXT</button>
                <button id="saveText" class="tool-button" type="button">Save</button>
              </div>
            </div>
            <div class="code-tabs" aria-label="Code tabs">
              <div id="codeTabList" class="code-tab-list" role="tablist"></div>
              <button id="addCodeTab" class="tab-add-button" type="button" aria-label="Add typing tab" title="Add tab">+</button>
            </div>
            <textarea id="typingArea" spellcheck="false" placeholder="Write notes, paste code, outline a plan..."></textarea>
          </section>

          <section id="screenshotPanel" class="panel screenshot-panel" aria-label="Screenshot organizer">
            <div class="panel-heading">
              <div class="panel-title">
                <p class="eyebrow">Screenshots</p>
                <h2>Paste, preview, copy</h2>
              </div>
              <div class="screenshot-actions">
                <label class="tool-button upload-button" for="screenshotInput">Upload</label>
                <input id="screenshotInput" type="file" accept="image/*" multiple />
              </div>
            </div>
            <div id="screenshotDropzone" class="screenshot-dropzone" tabindex="0">
              <strong>Paste or drop screenshots here</strong>
              <span>Images stay in this browser on this PC.</span>
            </div>
            <div id="screenshotGrid" class="screenshot-grid" aria-live="polite"></div>
          </section>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
